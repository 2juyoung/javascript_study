<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* 함수의 정의와 호출 */
        // 01
        function numbering1() {
            document.write(1);
        }
        numbering1();

        // 02
        function numbering2() {
            i = 0;
            while(i < 10) {
                document.write(i);
                i += 1;
            }
        }
        numbering2();


        /* 함수의 효용성 */
        function numbering3() {
            for( i = 0; i < 1000; i++ ) {
                document.write(i+"<br/>");
            }
        }
        numbering3();


        /* 입력과 출력 */
        // 01
        function get_member1() {
            return 'egoing';
        }
        function get_member2() {
            return 'k8805';
        }
        alert(get_member1());
        alert(get_member2());

        // 02
        function get_member3() {
            return 'egoing1'; // return 'egoing1'을 실행한 후 함수가 종료됨
            return 'egoing2';
            return 'egoing3';
        }
        alert(get_member3());

    </script>
</body>
</html>
